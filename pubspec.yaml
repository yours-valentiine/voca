name: voca
description: "An app for learning foreign languages"
publish_to: "none"
version: 0.1.0-alpha.1

environment:
  sdk: ^3.10.4

dependencies:
  apk_sideload: ^0.0.2
  archive: ^4.0.9
  crypto: ^3.0.7
  device_info_plus: ^12.4.0
  dio: ^5.9.2
  drift: ^2.32.0
  drift_flutter: ^0.3.0
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_colorpicker: ^1.1.0
  flutter_context_menu: ^0.4.2
  flutter_localizations:
    sdk: flutter
  flutter_markdown_plus: ^1.0.7
  flutter_riverpod: ^3.3.1
  freezed_annotation: ^3.1.0
  fsrs: ^2.0.1
  go_router: ^17.1.0
  json_annotation: ^4.11.0
  package_info_plus: ^9.0.1
  path_provider: ^2.1.5
  rxdart: ^0.28.0
  shared_preferences: ^2.5.4
  slang: ^4.13.0
  slang_flutter: ^4.13.0
  uuid: ^4.5.3
  version: ^3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.32.0
  build_runner: ^2.12.2
  freezed: ^3.2.5
  slang_build_runner: ^4.14.0
  json_serializable: ^6.13.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  min_sdk_android: 21
  image_path: "assets/icon/icon.png"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 256
